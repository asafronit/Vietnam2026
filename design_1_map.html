<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vietnam 2026 — Design 1: Map Explorer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1923;--panel:#1a2535;--card:#1e2d40;--border:rgba(255,255,255,0.08);--primary:#22d3ee;--accent:#f59e0b;--green:#10b981;--text:#f1f5f9;--muted:#94a3b8;--r:12px}
html{height:-webkit-fill-available;height:100%}body{min-height:100vh;min-height:-webkit-fill-available;font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.hdr{position:fixed;top:0;left:0;right:0;height:56px;z-index:1000;background:rgba(15,25,35,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;padding:0 max(20px,env(safe-area-inset-right)) 0 max(20px,env(safe-area-inset-left));overflow-x:auto}
.hdr-logo{font-size:1.1rem;font-weight:800}.hdr-logo span{color:var(--primary)}
.hdr-divider{width:1px;height:20px;background:var(--border)}
.hdr-stats{display:flex;gap:16px}
.hdr-stat{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
.hdr-stat b{color:var(--text);font-weight:600}
.layout{display:flex;position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden}
.map-pane{flex:1 1 55%;position:relative}
#map{width:100%;height:100%;min-height:200px}
.detail-pane{flex:0 0 420px;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column}
.stop-list{padding:12px;display:flex;flex-direction:column;gap:4px}
.stop-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent;background:none;width:100%;text-align:right;color:var(--text);font-family:inherit}
.stop-chip:hover{background:var(--card)}
.stop-chip.active{background:var(--card);border-color:var(--primary)}
.stop-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:#fff;flex-shrink:0}
.stop-info{flex:1;min-width:0;text-align:right}
.stop-name{font-size:.88rem;font-weight:600}
.stop-meta{font-size:.72rem;color:var(--muted);margin-top:1px}
.stop-badge{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.08);color:var(--muted);white-space:nowrap}
.detail-panel{display:none;flex-direction:column;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail-panel.visible{display:flex}
.detail-header{padding:20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:10}
.detail-back{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;margin-bottom:10px;padding:0}
.detail-back:hover{color:var(--text)}
.detail-num{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff;margin-bottom:10px}
.detail-city{font-size:1.4rem;font-weight:800}
.detail-sub{font-size:.8rem;color:var(--muted);margin-top:3px}
.detail-pills{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:600;background:rgba(255,255,255,.07);color:var(--muted)}
.pill.green{background:rgba(16,185,129,.15);color:var(--green)}
.pill.amber{background:rgba(245,158,11,.15);color:var(--accent)}
.pill.cyan{background:rgba(34,211,238,.15);color:var(--primary)}
.detail-body{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.section-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:8px}
.hotel-card{background:var(--card);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border);margin-bottom:6px}
.hotel-name{font-weight:700;font-size:.88rem}
.hotel-price{font-size:.75rem;color:var(--accent);font-weight:600;margin-top:2px}
.hotel-note{font-size:.76rem;color:var(--muted);margin-top:4px;line-height:1.4}
.hotel-link{display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:.72rem;color:var(--primary);text-decoration:none;font-weight:600}
.hotel-link:hover{text-decoration:underline}
.hotel-link:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:2px}
.act-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--card);border-radius:9px;border:1px solid var(--border);margin-bottom:5px}
.act-icon{font-size:.95rem;flex-shrink:0;width:24px}
.act-info{flex:1}
.act-name{font-size:.83rem;font-weight:500}
.act-links{display:flex;gap:5px;margin-top:4px}
.act-link{font-size:.67rem;font-weight:700;padding:2px 8px;border-radius:12px;text-decoration:none;transition:opacity .15s}
.act-link:hover{opacity:.8}
.act-link:focus-visible{outline:2px solid currentColor;outline-offset:2px;border-radius:12px}
.act-link.map{background:rgba(59,130,246,.2);color:#60a5fa}
.act-link.grab{background:rgba(16,185,129,.2);color:var(--green)}
.act-cost{font-size:.76rem;color:var(--accent);font-weight:700;flex-shrink:0}
.tips-box{background:rgba(245,158,11,.1);border-right:3px solid var(--accent);border-radius:var(--r) 0 0 var(--r);padding:12px 14px}
.tips-box li{font-size:.8rem;color:#fcd34d;margin-right:14px;margin-bottom:4px;line-height:1.5}
.contact-card{background:rgba(124,58,237,.1);border-right:3px solid #7c3aed;border-radius:var(--r) 0 0 var(--r);padding:10px 14px;margin-bottom:5px}
.contact-name{font-weight:700;font-size:.85rem}
.contact-desc{font-size:.76rem;color:var(--muted);margin:2px 0 6px;line-height:1.4}
.wa-btn{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;color:#a78bfa;font-weight:600;text-decoration:none}
.wa-btn:hover{text-decoration:underline}
.wa-btn:focus-visible{outline:2px solid #a78bfa;outline-offset:2px;border-radius:2px}
.detail-nav{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--panel);position:sticky;bottom:0}
.nav-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.nav-btn.primary{background:var(--primary);color:var(--bg);border-color:var(--primary)}
.nav-btn.primary:hover{opacity:.9}
.custom-pin{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,.4);box-shadow:0 2px 12px rgba(0,0,0,.4);cursor:pointer;transition:transform .15s;font-family:"Inter",sans-serif}
.custom-pin.active-pin{border:3px solid #fff;transform:scale(1.25);box-shadow:0 0 0 3px rgba(34,211,238,.5)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}.stop-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}.stop-tag{font-size:20px;line-height:1;cursor:default}.flight-icon{display:inline-block;font-size:15px;line-height:1;font-family:sans-serif}.pin-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}.pin-tags{display:flex;gap:2px;font-size:14px;line-height:1;background:rgba(255,255,255,.92);border-radius:6px;padding:1px 3px;box-shadow:0 1px 4px rgba(0,0,0,.25);white-space:nowrap}.stop-tag.tag-intl{background:rgba(59,130,246,.25);border-radius:8px;padding:0 3px}.stop-tag.tag-dom{background:rgba(239,68,68,.25);border-radius:8px;padding:0 3px}.flight-svg{display:inline-block;width:22px;height:22px;background-size:contain;background-repeat:no-repeat;background-position:center;vertical-align:middle}.icon-depart-intl{background-image:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%233b82f6%22%3E%3Cpath%20d%3D%22M21%2016v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10%202.67%2010%203.5V9l-8%205v2l8-2.5V19l-2%201.5V22l3.5-1%203.5%201v-1.5L13%2019v-5.5l8%202.5z%22/%3E%3C/svg%3E)}.icon-depart-dom{background-image:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23ef4444%22%3E%3Cpath%20d%3D%22M21%2016v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10%202.67%2010%203.5V9l-8%205v2l8-2.5V19l-2%201.5V22l3.5-1%203.5%201v-1.5L13%2019v-5.5l8%202.5z%22/%3E%3C/svg%3E)}.icon-land-intl{background-image:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%233b82f6%22%3E%3Cpath%20d%3D%22M21%2016v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10%202.67%2010%203.5V9l-8%205v2l8-2.5V19l-2%201.5V22l3.5-1%203.5%201v-1.5L13%2019v-5.5l8%202.5z%22/%3E%3C/svg%3E);transform:rotate(180deg)}.icon-land-dom{background-image:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23ef4444%22%3E%3Cpath%20d%3D%22M21%2016v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10%202.67%2010%203.5V9l-8%205v2l8-2.5V19l-2%201.5V22l3.5-1%203.5%201v-1.5L13%2019v-5.5l8%202.5z%22/%3E%3C/svg%3E);transform:rotate(180deg)}
.reg-sep{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:10px 2px 4px}
.next-transport{background:var(--card);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border);font-size:.82rem;color:var(--muted)}
@media(max-width:768px){html,body{overflow-y:auto;overflow-x:hidden}.layout{position:static;flex-direction:column;height:auto;overflow:visible;margin-top:56px;top:auto;left:auto;right:auto;bottom:auto}.map-pane{height:40svh;height:40vh;min-height:240px;flex:none}.detail-pane{flex:none;width:100%;height:auto;max-height:none;overflow:visible;border-left:none;border-top:1px solid var(--border)}.detail-panel{height:auto;overflow:visible}.detail-panel.visible{display:block}}
.hdr-back{display:inline-flex;align-items:center;gap:4px;font-size:.78rem;font-weight:600;color:var(--muted);text-decoration:none;padding:4px 10px;border-radius:20px;border:1px solid var(--border);transition:all .15s;white-space:nowrap}
.hdr-back:hover{color:var(--text);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
.hdr-back:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:20px}
/* iOS touch targets: Leaflet zoom controls must be ≥44x44px (WCAG 2.5.5) */
.leaflet-control-zoom a{width:44px!important;height:44px!important;line-height:44px!important;font-size:1.2rem!important}
/* overscroll-behavior: prevent panel scroll chaining to map (WCAG 2.5.5 motor a11y) */
.detail-pane,.detail-panel{overscroll-behavior-y:contain}
</style>
</head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
// iOS: recalculate Leaflet size on resize / orientation change / address bar show-hide
(function(){
  var _t;
  function triggerResize(){
    clearTimeout(_t);
    _t=setTimeout(function(){if(typeof map!=="undefined"&&map)map.invalidateSize(false);},200);
  }
  // orientationchange fires when phone rotates
  window.addEventListener("orientationchange",function(){setTimeout(triggerResize,350);});
  // visualViewport fires when iOS address bar slides in/out
  if(window.visualViewport){
    window.visualViewport.addEventListener("resize",triggerResize);
  } else {
    window.addEventListener("resize",triggerResize);
  }
  // Settle after initial render (Leaflet needs container to have painted dimensions)
  setTimeout(triggerResize,600);
})();
</script>

  const rl={north:"צפון",central:"מרכז",south:"דרום"};
  const hotelsHtml=stop.hotels.map(h=>`<div class="hotel-card"><div class="hotel-name">${h.name}</div>${h.price?`<div class="hotel-price">${h.price}</div>`:""}<div class="hotel-note">${h.note}</div>${h.url?`<a class="hotel-link" href="${h.url}" target="_blank" rel="noopener noreferrer">📖 Booking.com ↗</a>`:""}</div>`).join("");
  const actsHtml=stop.activities.map(a=>`<div class="act-item"><span class="act-icon" aria-hidden="true">${a.icon}</span><div class="act-info"><div class="act-name">${a.name}</div><div class="act-links"><a class="act-link map" href="${a.mapUrl}" target="_blank" rel="noopener noreferrer">📍 מפה</a></div></div><span class="act-cost">${a.cost}</span></div>`).join("");
  const tipsHtml=stop.tips.length?`<ul class="tips-box">${stop.tips.map(t=>`<li>${t}</li>`).join("")}</ul>`:"";
  const contactsHtml=stop.contacts.length?stop.contacts.map(c=>`<div class="contact-card"><div class="contact-name">${c.name}</div><div class="contact-desc">${c.desc}</div><a class="wa-btn" href="${c.wa}" target="_blank" rel="noopener noreferrer">💬 WhatsApp <span dir="ltr">${c.phone}</span></a></div>`).join(""):"";
  document.getElementById("stopDetailView").innerHTML=`
    <div class="detail-header">
      <button class="detail-back" onclick="closeDetail()" aria-label="חזור לרשימת העצירות">← כל העצירות</button>
      <div class="detail-num" style="background:${stop.color}">${stop.id}</div>
      <div class="detail-city">${stop.name}</div>
      <div class="detail-sub">${stop.dates} · ${stop.nights} לילות · ${stop.arrival}</div>
      <div class="detail-pills">
        <span class="pill cyan">🌏 ${stop.nights} לילות</span>
        <span class="pill amber">💰 ${stop.budget}</span>
        <span class="pill ${rc[stop.region]}">📍 ${rl[stop.region]}</span>
      </div>
    </div>
    <div class="detail-body">
      ${hotelsHtml?`<section aria-label="מלונות"><div class="section-title">🏨 אפשרויות מלון</div>${hotelsHtml}</section>`:""}
      ${actsHtml?`<section aria-label="פעילויות"><div class="section-title">🎯 פעילויות</div>${actsHtml}</section>`:""}
      ${tipsHtml?`<section aria-label="טיפים"><div class="section-title">💡 טיפים</div>${tipsHtml}</section>`:""}
      ${contactsHtml?`<section aria-label="אנשי קשר"><div class="section-title">📞 אנשי קשר</div>${contactsHtml}</section>`:""}
      ${stop.nextTransport?`<div class="next-transport"><b style="color:var(--text)">המשך הטיול:</b> ${stop.nextTransport}</div>`:""}
    </div>
    <div class="detail-nav">
      <button class="nav-btn" onclick="${prev?`openStop(${prev.id})`:"closeDetail()"}" aria-label="${prev?`עצירה קודמת: ${prev.name}`:"חזור לרשימה"}">← ${prev?prev.name:"רשימה"}</button>
      <button class="nav-btn primary" onclick="${next?`openStop(${next.id})`:""}" ${next?"":"disabled"} aria-label="${next?`עצירה הבאה: ${next.name}`:"סוף הטיול"}">${next?`${next.name} →`:"🏠 סיום"}</button>
    </div>`;
}

// iOS: recalculate Leaflet size on resize / orientation change / address bar show-hide
(function(){
  var _t;
  function triggerResize(){
    clearTimeout(_t);
    _t=setTimeout(function(){if(typeof map!=="undefined"&&map)map.invalidateSize(false);},200);
  }
  // orientationchange fires when phone rotates
  window.addEventListener("orientationchange",function(){setTimeout(triggerResize,350);});
  // visualViewport fires when iOS address bar slides in/out
  if(window.visualViewport){
    window.visualViewport.addEventListener("resize",triggerResize);
  } else {
    window.addEventListener("resize",triggerResize);
  }
  // Settle after initial render (Leaflet needs container to have painted dimensions)
  setTimeout(triggerResize,600);
})();
</script>
</body>
</html>
