<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1923;--panel:#1a2535;--card:#1e2d40;--border:rgba(255,255,255,0.08);--primary:#22d3ee;--accent:#f59e0b;--green:#10b981;--text:#f1f5f9;--muted:#94a3b8;--r:12px}
html{height:-webkit-fill-available;height:100%}body{min-height:100vh;min-height:-webkit-fill-available;font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.hdr{position:fixed;top:0;left:0;right:0;height:56px;z-index:1000;background:rgba(15,25,35,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;padding:0 max(20px,env(safe-area-inset-right)) 0 max(20px,env(safe-area-inset-left));overflow-x:auto}
.hdr-logo{font-size:1.1rem;font-weight:800}.hdr-logo span{color:var(--primary)}
.hdr-divider{width:1px;height:20px;background:var(--border)}
.hdr-stats{display:flex;gap:16px}
.hdr-stat{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
.hdr-stat b{color:var(--text);font-weight:600}
.layout{display:flex;position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden}
.map-pane{flex:1 1 55%;position:relative}
#map{width:100%;height:100%;min-height:200px}
.detail-pane{flex:0 0 420px;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column}
.stop-list{padding:12px;display:flex;flex-direction:column;gap:4px}
.stop-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent;background:none;width:100%;text-align:left;color:var(--text);font-family:inherit}
.stop-chip:hover{background:var(--card)}
.stop-chip.active{background:var(--card);border-color:var(--primary)}
.stop-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:#fff;flex-shrink:0}
.stop-info{flex:1;min-width:0;text-align:left}
.stop-name{font-size:.88rem;font-weight:600}
.stop-meta{font-size:.72rem;color:var(--muted);margin-top:1px}

.detail-back{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;cursor:pointer;background:none;border:none;color:var(--muted);font-family:inherit;margin-bottom:10px;padding:0}
.detail-back:hover{color:var(--text)}

.detail-city{font-size:1.4rem;font-weight:800}

.detail-pills{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:600;background:rgba(255,255,255,.07);color:var(--muted)}
.pill.green{background:rgba(16,185,129,.15);color:var(--green)}

.detail-body{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.section-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:8px}
.hotel-card{background:var(--card);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border);margin-bottom:6px}

.act-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--card);border-radius:9px;border:1px solid var(--border);margin-bottom:5px}

.act-links{display:flex;gap:5px;margin-top:4px}

.wa-btn{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;color:#a78bfa;font-weight:600;text-decoration:none}
.wa-btn:hover{text-decoration:underline}
.wa-btn:focus-visible{outline:2px solid #a78bfa;outline-offset:2px;border-radius:2px}
.detail-nav{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--panel);position:sticky;bottom:0}
.nav-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.nav-btn:hover{border-color:var(--primary);color:var(--primary)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.nav-btn.primary{background:var(--primary);color:var(--bg);border-color:var(--primary)}
.nav-btn.primary:hover{opacity:.9}
.custom-pin{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,.4);box-shadow:0 2px 12px rgba(0,0,0,.4);cursor:pointer;transition:transform .15s;font-family:"Inter",sans-serif}
.custom-pin.active-pin{border:3px solid #fff;transform:scale(1.25);box-shadow:0 0 0 3px rgba(34,211,238,.5)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}.stop-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}.stop-tag{font-size:20px;line-height:1;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;display:inline-flex;align-items:center}.stop-tag:hover,.stop-tag:focus{outline:2px solid rgba(255,255,255,.4);outline-offset:2px;border-radius:4px}.flight-icon{display:inline-block;font-size:15px;line-height:1;font-family:sans-serif}.pin-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}.pin-tags{display:flex;gap:2px;font-size:14px;line-height:1;background:rgba(255,255,255,.92);border-radius:6px;padding:1px 3px;box-shadow:0 1px 4px rgba(0,0,0,.25);white-space:nowrap}.stop-tag.tag-intl{background:rgba(59,130,246,.25);border-radius:8px;padding:0 3px}.stop-tag.tag-dom{background:rgba(239,68,68,.25);border-radius:8px;padding:0 3px}.flight-svg{display:inline-block;width:22px;height:22px;background-size:contain;background-repeat:no-repeat;background-position:center;vertical-align:middle}.icon-depart-intl{background-image:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%233b82f6%22%3E%3Cpath%20d%3D%22M21%2016v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10%202.67%2010%203.5V9l-8%205v2l8-2.5V19l-2%201.5V22l3.5-1%203.5%201v-1.5L13%2019v-5.5l8%202.5z%22/%3E%3C/svg%3E)}.icon-depart-dom{background-image:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23ef4444%22%3E%3Cpath%20d%3D%22M21%2016v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10%202.67%2010%203.5V9l-8%205v2l8-2.5V19l-2%201.5V22l3.5-1%203.5%201v-1.5L13%2019v-5.5l8%202.5z%22/%3E%3C/svg%3E)}.icon-land-intl{background-image:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%233b82f6%22%3E%3Cpath%20d%3D%22M21%2016v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10%202.67%2010%203.5V9l-8%205v2l8-2.5V19l-2%201.5V22l3.5-1%203.5%201v-1.5L13%2019v-5.5l8%202.5z%22/%3E%3C/svg%3E);transform:rotate(180deg)}.icon-land-dom{background-image:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23ef4444%22%3E%3Cpath%20d%3D%22M21%2016v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10%202.67%2010%203.5V9l-8%205v2l8-2.5V19l-2%201.5V22l3.5-1%203.5%201v-1.5L13%2019v-5.5l8%202.5z%22/%3E%3C/svg%3E);transform:rotate(180deg)}
.reg-sep{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:10px 2px 4px}
.next-transport{background:var(--card);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border);font-size:.82rem;color:var(--muted)}

.leaflet-control-zoom a{width:44px!important;height:44px!important;line-height:44px!important;font-size:1.2rem!important}

.detail-pane,.detail-panel{overscroll-behavior-y:contain}

function openInfoModal(stopId){
  var stop=stops.find(function(s){return s.id===stopId;});
  if(!stop)return;
  var data=stopInfoData[stopId]||{};
  var regionNames={north:"North Vietnam",central:"Central Vietnam",south:"South Vietnam"};
  document.getElementById("infoHeroImg").src=data.heroImg||"";
  document.getElementById("infoHeroImg").alt=stop.name;
  document.getElementById("infoModalTitle").textContent=stop.name;
  document.getElementById("infoRegion").textContent=regionNames[stop.region]||"";
  document.getElementById("infoDates").textContent=stop.dates+" · "+stop.nights+" nights";
  var htEl=document.getElementById("infoHeroTags");
  htEl.innerHTML=(stopTags[stopId]||[]).map(function(t){
    return tagDefs[t]?'<span class="info-hero-tag">'+(tagDefs[t].html||tagDefs[t].emoji)+" "+tagDefs[t].label+"</span>":'';
  }).join("");
  document.getElementById("infoDesc").textContent=data.desc||"";
  // Flight section
  var flightEl=document.getElementById("infoFlightSection");
  flightEl.innerHTML="";
  if(data.flights){
    var order=["land_intl","land_dom","depart_intl","depart_dom"];
    var types=order.filter(function(k){return data.flights[k];});
    if(types.length){
      var fhtml='<span class="info-section-title">Flight Details</span>';
      types.forEach(function(key){
        var fi=data.flights[key];
        var isDepart=key.indexOf("depart")===0;
        var isIntl=key.indexOf("intl")>-1;
        var color=isIntl?"#3b82f6":"#ef4444";
        var dirLabel=(isDepart?"Departure":"Arrival")+" — "+(isIntl?"International":"Domestic");
        var fromCode=(fi.from.match(/\(([A-Z]+)\)/)||["",""])[1];
        var toCode=(fi.to.match(/\(([A-Z]+)\)/)||["",""])[1];
        var fromCity=fi.from.replace(/\s*\([^)]+\)/,"").trim();
        var toCity=fi.to.replace(/\s*\([^)]+\)/,"").trim();
        var timeLabel=isDepart?("Departs "+(fi.departs||"TBC")):("Arrives "+(fi.arrives||"TBC"));
        fhtml+='<div class="flight-card">';
        fhtml+='<div class="flight-dir-label"><span style="font-size:1.6rem">'+(isDepart?"&#9992;":"&#128738;")+'</span><span style="color:'+color+'">'+dirLabel+'</span></div>';
        fhtml+='<div class="flight-route"><div class="flight-airport"><div class="flight-airport-code">'+fromCode+'</div><div class="flight-airport-city">'+fromCity+'</div></div>';
        fhtml+='<div class="flight-route-arrow">&#10230;</div>';
        fhtml+='<div class="flight-airport"><div class="flight-airport-code">'+toCode+'</div><div class="flight-airport-city">'+toCity+'</div></div></div>';
        fhtml+='<div class="flight-meta"><span class="flight-meta-chip">&#9992; '+(fi.no||"TBC")+'</span><span class="flight-meta-chip">'+(fi.airline||"")+'</span><span class="flight-meta-chip">'+(fi.date||"")+'</span><span class="flight-meta-chip">&#9200; '+timeLabel+'</span></div>';
        if(fi.tips&&fi.tips.length){fhtml+='<ul class="flight-tips-list">'+fi.tips.map(function(t){return"<li>"+t+"</li>";}).join("")+"</ul>";}
        if(fi.transport&&fi.transport.length){
          fhtml+='<span class="info-section-title" style="margin-top:6px;display:block">Getting There</span><div class="transport-grid">';
          fi.transport.forEach(function(tr){fhtml+='<div class="transport-card"><div class="transport-mode">'+tr.mode+'</div><div class="transport-cost">'+tr.cost+'</div><div class="transport-note">'+tr.time+(tr.note?" · "+tr.note:"")+'</div></div>';});
          fhtml+='</div>';
        }
        fhtml+='</div>';
      });
      flightEl.innerHTML=fhtml;
    }
  }
  // Attractions
  var attrEl=document.getElementById("infoAttrSection");
  attrEl.innerHTML="";
  if(stop.activities&&stop.activities.length){
    var ahtml='<span class="info-section-title">Highlights &amp; Prices</span><div class="attr-grid">';
    stop.activities.forEach(function(a){ahtml+='<div class="attr-row"><span class="attr-icon">'+a.icon+'</span><span class="attr-name">'+a.name+'</span><span class="attr-cost">'+a.cost+'</span></div>';});
    ahtml+='</div>';
    attrEl.innerHTML=ahtml;
  }
  // Media
  var mediaEl=document.getElementById("infoMediaSection");
  var ytId=data.ytId||"";
  if(ytId){
    mediaEl.innerHTML='<span class="info-section-title">Watch</span><div class="yt-wrap"><iframe src="https://www.youtube.com/embed/'+ytId+'" allowfullscreen loading="lazy" title="'+stop.name+' video"></iframe></div>';
  } else {
    mediaEl.innerHTML='<span class="info-section-title">Watch</span><div class="yt-wrap"><div class="yt-placeholder"><span class="yt-placeholder-icon">&#9654;</span><span>Add a YouTube video ID to stopInfoData['+stopId+'].ytId to show a video here</span></div></div>';
  }
  // Tips
  var tipsEl=document.getElementById("infoTipsSection");
  tipsEl.innerHTML="";
  if(stop.tips&&stop.tips.length){
    var thtml='<span class="info-section-title">Travel Tips</span><ul class="flight-tips-list">'+stop.tips.map(function(t){return"<li>"+t+"</li>";}).join("")+"</ul>";
    tipsEl.innerHTML=thtml;
  }
  // Particles
  spawnParticles(data.anim||"city");
  // Show modal
  var modal=document.getElementById("infoModal");
  var backdrop=document.getElementById("infoBackdrop");
  modal.removeAttribute("hidden");
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      modal.classList.add("open");
      backdrop.classList.add("open");
    });
  });
  document.body.style.overflow="hidden";
}

function copyAddressForGrab(addr){
  var t=document.getElementById("copyToast");
  function showToast(){if(t){t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2800);}}
  function fallbackCopy(){var ta=document.createElement("textarea");ta.value=addr;ta.style.cssText="position:fixed;opacity:0;top:0;left:0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}finally{document.body.removeChild(ta);}}
  function openGrab(){
    var appUrl="grab://open?screenType=BOOKING";
    var webUrl="https://www.grab.com/vn/";
    var gone=false;
    var timer=setTimeout(function(){if(!gone){gone=true;window.open(webUrl,"_blank","noopener");}},1600);
    window.addEventListener("blur",function onBlur(){gone=true;clearTimeout(timer);window.removeEventListener("blur",onBlur);});
    window.location.href=appUrl;
  }
  function done(){showToast();openGrab();}
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(addr).then(done,function(){fallbackCopy();done();});
  } else {
    fallbackCopy();done();
  }
}function closeInfoModal(){
  var modal=document.getElementById("infoModal");
  var backdrop=document.getElementById("infoBackdrop");
  modal.classList.remove("open");
  backdrop.classList.remove("open");
  setTimeout(function(){
    modal.setAttribute("hidden","");
    document.body.style.overflow="";
    clearParticles();
    if(_modalTrigger){_modalTrigger.focus();_modalTrigger=null;}
  },380);
}

function spawnParticles(type){
  clearParticles();
  var container=document.getElementById("heroParticles");
  var lanternColors=["#f97316","#ef4444","#eab308","#22c55e","#3b82f6","#a855f7","#ec4899"];
  var count=type==="lantern"?10:type==="airplane"?5:24;
  for(var i=0;i<count;i++){
    var p=document.createElement(type==="airplane"?"span":"div");
    p.className="particle p-"+type;
    if(type==="airplane")p.innerHTML="&#9992;";
    if(type==="lantern")p.style.background=lanternColors[i%lanternColors.length];
    var delay=(Math.random()*5).toFixed(2);
    var dur=(3+Math.random()*6).toFixed(2);
    var left=(Math.random()*100).toFixed(1);
    var top=(10+Math.random()*75).toFixed(1);
    p.style.cssText+="left:"+left+"%;top:"+top+"%;animation-delay:"+delay+"s;animation-duration:"+dur+"s";
    container.appendChild(p);
  }
}

function clearParticles(){
  var c=document.getElementById("heroParticles");
  if(c)c.innerHTML="";
}

document.addEventListener("DOMContentLoaded",function(){
  var im=document.getElementById("infoModal");if(im)im.addEventListener("click",function(e){var b=e.target.closest("[data-grab-addr]");if(b)copyAddressForGrab(b.dataset.grabAddr);});
  var closeBtn=document.getElementById("infoModalClose");
  if(closeBtn)closeBtn.addEventListener("click",closeInfoModal);
  var backdrop=document.getElementById("infoBackdrop");
  if(backdrop)backdrop.addEventListener("click",closeInfoModal);
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeInfoModal();});
});</script>
